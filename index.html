<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Typing Practice</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1e1e2e; color: #cdd6f4; margin: 0; }
        .container { background: #313244; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 700px; }
        #quote { font-size: 1.4rem; margin-bottom: 1.5rem; line-height: 1.6; color: #a6adc8; min-height: 80px; }
        #input-field { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #45475a; border-radius: 8px; background: #181825; color: #f5e0dc; outline: none; transition: 0.3s; box-sizing: border-box; }
        #input-field.correct { border-color: #a6e3a1; box-shadow: 0 0 10px rgba(166, 227, 161, 0.2); }
        #input-field.incorrect { border-color: #f38ba8; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 2rem; }
        .stat-box { background: #45475a; padding: 10px; border-radius: 6px; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: #89b4fa; }
        .stat-value { font-size: 1.5rem; font-weight: bold; display: block; }
        button { margin-top: 2rem; padding: 10px 25px; border: none; border-radius: 6px; background: #89b4fa; color: #1e1e2e; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #b4befe; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div id="quote">The path to becoming a great developer is paved with consistent practice and curiosity.</div>
    <input type="text" id="input-field" placeholder="Type the text above..." autofocus>
    
    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">WPM</span>
            <span id="wpm" class="stat-value">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Accuracy</span>
            <span id="accuracy" class="stat-value">100%</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Seconds</span>
            <span id="timer" class="stat-value">0</span>
        </div>
    </div>

    <button onclick="resetGame()">Refresh Text</button>
</div>

<script>
    const quoteDisplay = document.getElementById('quote');
    const inputField = document.getElementById('input-field');
    const timerDisplay = document.getElementById('timer');
    const wpmDisplay = document.getElementById('wpm');
    const accuracyDisplay = document.getElementById('accuracy');

    let startTime;
    let timerInterval;
    let totalCharsTyped = 0;
    let isRunning = false;

    const phrases = [
        "The path to becoming a great developer is paved with consistent practice.",
        "Success is not final, failure is not fatal: it is the courage to continue that counts.",
        "JavaScript is a versatile language that powers the modern web interface.",
        "Always code as if the guy who ends up maintaining your code will be a violent psychopath."
    ];

    // Pick a random phrase
    quoteDisplay.innerText = phrases[Math.floor(Math.random() * phrases.length)];

    inputField.addEventListener('input', () => {
        const quote = quoteDisplay.innerText;
        const typedValue = inputField.value;

        // Start timer on first character
        if (!isRunning && typedValue.length > 0) {
            isRunning = true;
            startTime = new Date();
            timerInterval = setInterval(updateStats, 1000);
        }

        // Visual Feedback
        if (quote.startsWith(typedValue)) {
            inputField.className = 'correct';
        } else {
            inputField.className = 'incorrect';
        }

        // Logic for finishing
        if (typedValue === quote) {
            clearInterval(timerInterval);
            inputField.disabled = true;
            updateStats(); // Final calculation
        }
    });

    function updateStats() {
        const timeElapsed = (new Date() - startTime) / 1000; // in seconds
        const minutes = timeElapsed / 60;
        const typedValue = inputField.value;
        
        // Calculate WPM: (characters / 5) / minutes
        const words = typedValue.length / 5;
        const wpm = minutes > 0 ? Math.round(words / minutes) : 0;
        
        // Calculate Accuracy
        const quote = quoteDisplay.innerText;
        let correctChars = 0;
        for(let i=0; i<typedValue.length; i++) {
            if(typedValue[i] === quote[i]) correctChars++;
        }
        const accuracy = typedValue.length > 0 ? Math.round((correctChars / typedValue.length) * 100) : 100;

        timerDisplay.innerText = Math.floor(timeElapsed);
        wpmDisplay.innerText = wpm;
        accuracyDisplay.innerText = accuracy + "%";
    }

    function resetGame() {
        location.reload();
    }
</script>

</body>
</html>
